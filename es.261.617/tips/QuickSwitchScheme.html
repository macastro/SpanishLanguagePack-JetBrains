<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cambiar esquema</b></p><p>Puedes aplicar un estilo de código, esquema de colores o mapa de teclas diferente con una sola pulsación directamente desde el editor. Presiona <span class="shortcut">&shortcut:QuickChangeScheme;</span> (<span class="control">Ver | Cambio Rápido de Esquema</span>) para especificar el esquema al que quieres cambiar.</p></body></html>
