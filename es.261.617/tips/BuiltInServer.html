<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cambiar el puerto del servidor web integrado</b></p><p>Para cambiar el puerto del servidor web integrado, en el diálogo <span class="control">Configuración</span> (<span class="shortcut">&shortcut:ShowSettings;</span>), ve a <span class="control">Build, Execution, Deployment | Debugger</span>) y establece el nuevo valor en el campo <span class="control">Puerto del servidor integrado</span>.</p></body></html>
