<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Plugin Terminal</b></p><p>Puedes instalar el plugin Terminal y luego usar Terminal directamente en DataGrip.</p><p>Para instalar un plugin, abre <span class="control">Configuración</span> <span class="shortcut">&shortcut:ShowSettings;</span> y navega a <span class="control">Plugins</span>. Escribe <span class="control">Terminal</span> en el campo de búsqueda y haz clic en <span class="control">Instalar</span>.</p><p class="image"><img src="images/tips_db_DBTerminal.png" alt="Instalar el plugin Terminal" style="border: 1px solid #55555;" /></p></body></html>
