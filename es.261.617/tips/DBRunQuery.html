<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ejecutar una query</b></p><p>Para ejecutar una query, haz clic derecho en una query y selecciona <span class="control">Execute</span> o usa un atajo de teclado (Cmd + Enter para macOS, Ctrl+Enter para Windows y Linux).</p><p class="image"><img src="images/db_pl_tips_DBRunQuery.png" alt="Ejecutar una query desde una consola de query" style="border: 1px solid #55555;" /></p></body></html>
