<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Integra tu IDE con YouTrack</b></p><p>Gestiona tus proyectos de manera eficiente con YouTrack. Si tienes una instancia de YouTrack, puedes usar el plugin <span class="control">YouTrack Integration</span> para trabajar con tus issues directamente en PyCharm.</p><p class="image"><img src="images/py_tips_youtrack_integration.png" alt="YouTrack integration" style="border: 1px solid #55555;" /></p><p>YouTrack es gratuito para equipos de 10 para siempre. <a href="https://www.jetbrains.com/youtrack/download/get_youtrack.html#section=incloud">Prueba YouTrack</a>.</p></body></html>
