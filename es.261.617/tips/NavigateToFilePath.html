<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir</b></p><p>Para navegar a cualquier parte de la ruta del archivo, haz <span class="shortcut">Ctrl+Clic</span> (en Windows y Linux)/ <span class="shortcut">⌘Clic</span> (en macOS) en su pestaña en el editor. Selecciona el elemento deseado y se abrirá en el explorador de archivos.</p><p class="image"><img src="images/py_tips_navigateToFilePath.png" alt="Navigate to file path" style="border: 1px solid #55555;" /></p></body></html>
