<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Configurar colores en archivos CSS</b></p><p>PyCharm facilita la especificación de colores en archivos CSS. Las propiedades <span class="code_emphasis">color</span> tienen iconos del color correspondiente en el margen del editor. Haz clic en el icono para elegir el color deseado usando el selector de color.</p><p class="image"><img src="images/py_tips_cssColor.png" alt="Color CSS" style="border: 1px solid #55555;" /></p></body></html>
