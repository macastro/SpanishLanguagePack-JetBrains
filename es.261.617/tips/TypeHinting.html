<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Usa <span class="control">type hints</span> para informar a PyCharm sobre los tipos esperados de parámetros, variables locales, campos o valores de retorno.</p><p>Cuando el tipo esperado se especifica en un docstring o una anotación de tipo, PyCharm proporciona sugerencias de completado de código para el tipo específico:</p><p class="image"><img src="images/py_tips_type_hinting_return.png" alt="Type Hinting" style="border: 1px solid #55555;" /></p></body></html>
