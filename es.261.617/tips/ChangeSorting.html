<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ordenar sugerencias de completado</b></p><p>Puedes ordenar las sugerencias de completado por relevancia o alfabéticamente.</p><p>Para ordenar alfabéticamente, selecciona la opción <span class="control">Ordenar por Nombre</span>. Para ordenar por relevancia, desmarca la casilla <span class="control">Ordenar por Nombre</span>.</p><p class="image"><img src="images/py_tips_changeLookupSorting.png" alt="Cambiar ordenación de búsqueda" style="border: 1px solid #55555;" /></p></body></html>
