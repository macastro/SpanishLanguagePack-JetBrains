<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Hacer copia de seguridad de una tabla</b></p><p>Para crear una copia de seguridad de una tabla, arrastra la tabla al nodo <span class="control">tables</span> de la misma fuente de datos en la vista de árbol de la base de datos. Escribe un nuevo nombre y haz clic en <span class="control">Run</span>.</p><p class="image"><img src="images/tips_db_back_up_table.png" alt="Hacer copia de seguridad de una tabla" style="border: 1px solid #55555;" /></p></body></html>
