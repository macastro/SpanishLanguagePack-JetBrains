<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Completar nombres de etiquetas XML</b></p><p>Presiona <span class="shortcut">&shortcut:CodeCompletion;</span> dos veces para completar nombres de etiquetas XML de namespaces no declarados en el archivo actual. Si el namespace aún no está declarado, la declaración se genera automáticamente.</p><p class="image"><img src="images/ps_tips-tagNameCompletion.png" alt="Completado de nombres de etiquetas" style="border: 1px solid #55555;" /></p></body></html>
