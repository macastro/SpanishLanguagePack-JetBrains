documentation.raw.byte.string.literals.def=<h3>Literales de cadena de bytes sin procesar</h3>
documentation.raw.byte.string.literals.p1=<p>Los literales de cadena sin procesar no procesan ningún escape. Comienzan con el carácter <code class\="hljs">U+0062</code> (<code class\="hljs">b</code>), seguido de <code class\="hljs">U+0072</code> (<code class\="hljs">r</code>), seguido de menos de 256 caracteres <code class\="hljs">U+0023</code> (<code class\="hljs">\#</code>) y un carácter <code class\="hljs">U+0022</code> (comillas dobles). El <em>cuerpo de cadena sin procesar</em> puede contener cualquier secuencia de caracteres ASCII y solo puede terminar con otro carácter <code class\="hljs">U+0022</code> (comillas dobles), seguido de la misma cantidad de caracteres <code class\="hljs">U+0023</code> (<code class\="hljs">\#</code>) que precedían al carácter <code class\="hljs">U+0022</code> (comillas dobles) izquierdo. Los literales de cadena de bytes sin procesar no pueden contener ningún byte no ASCII.</p>
documentation.raw.byte.string.literals.p2=<p>Todos los caracteres contenidos en el cuerpo de cadena sin procesar representan su codificación ASCII. Los caracteres <code class\="hljs">U+0022</code> (comillas dobles) (a menos que vayan seguidos de al menos tantos caracteres <code class\="hljs">U+0023</code> (<code class\="hljs">\#</code>) como se usaron para comenzar el literal de cadena sin procesar) o <code class\="hljs">U+005C</code> (<code class\="hljs">\\</code>) no tienen ningún significado especial.</p>
documentation.raw.byte.string.literals.p3=<p>Ejemplos de literales de cadena de bytes\:</p>
documentation.raw.string.literals.def=<h3>Literales de cadena sin procesar</h3>
documentation.raw.string.literals.p1=<p>Los literales de cadena sin procesar no procesan ningún escape. Comienzan con el carácter <code>U+0072</code> (<code>r</code>), seguido de menos de 256 caracteres <code>U+0023</code> (<code>\#</code>) y un carácter <code>U+0022</code> (comillas dobles). El <em>cuerpo de cadena sin procesar</em> puede contener cualquier secuencia de caracteres Unicode y solo puede terminar con otro carácter <code>U+0022</code> (comillas dobles), seguido de la misma cantidad de caracteres <code>U+0023</code> (<code>\#</code>) que precedían al carácter <code>U+0022</code> (comillas dobles) izquierdo</p>
documentation.raw.string.literals.p2=<p>Todos los caracteres Unicode contenidos en el cuerpo de cadena sin procesar se representan a sí mismos. Los caracteres <code>U+0022</code> (comillas dobles) (a menos que vayan seguidos de al menos tantos caracteres <code>U+0023</code> (<code>\#</code>) como se usaron para comenzar el literal de cadena sin procesar) o <code>U+005C</code> (<code>\\</code>) no tienen ningún significado especial.</p>
documentation.raw.string.literals.p3=<p>Ejemplos de literales de cadena\:</p>
