stm32.cube.mx.project.wizard.html=<ol style\="margin-top\: 0;"><li>En STM32CubeMX\:<ol type\="a"><li>En el panel <i>New Project</i>, haz clic en <i>ACCESS TO MCU SELECTOR</i>. También puedes seleccionar <i>ACCESS TO BOARD SELECTOR</i>.</li><li>Selecciona tu MCU o placa de desarrollo.</li><li>Haz clic en <i>Start Project</i>.</li><li>En la ventana de configuración del dispositivo generada, configura los periféricos y middleware necesarios.</li><li>Navega a la pestaña <i>Project Manager</i>.</li><li>Selecciona <i>CMake</i> del menú desplegable <i>Toolchain / IDE</i>.</li><li>Ingresa el nombre de tu proyecto en el campo <i>Project Name</i>.</li><li>Haz clic en <i>GENERATE CODE</i>.</li><li>Usa el atajo de teclado <i>{0}</i> para copiar la ruta del campo <i>Toolchain Folder Location</i>.</li></ol></li><li>En CLion\:<ol type\="a"><li>Ingresa la ruta que copiaste en el campo <i>Ubicación</i> en la parte superior de este diálogo.</li><li>Haz clic en <i>{1}</i>.</li><li>En el diálogo <i>Asistente de apertura de proyecto</i> que aparece, selecciona el perfil CMake <i>Debug – Debug</i> de la lista, haz clic en <i>Habilitar</i>, y luego haz clic en <i>OK</i>.</li></ol></li><li>Tu proyecto STM32CubeMX ahora está creado.</li></ol>
