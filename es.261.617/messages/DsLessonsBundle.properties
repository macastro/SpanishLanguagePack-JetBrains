jupyter.onboarding.start.completion=Puedes completar rápidamente el nombre de la columna a incluir en el gráfico\: comienza escribiendo {0}, después de lo cual aparecerá la lista de completion. Alternativamente, también puedes presionar {1} y continuar escribiendo para acortar la lista.
