jupyter.onboarding.debug.introduction=Parece que hay un error de ejecución. Por defecto, el traceback en el área de salida está colapsado. Expande el traceback para previsualizar los detalles. Vamos a debuggear el error.
jupyter.onboarding.debugging.workflow.description=<strong>Nota</strong>\: La definición de la función y su llamada están en diferentes celdas. Para ejecutar debugging en este caso, necesitas primero ejecutar todas las celdas (ya hecho). Luego, necesitas comenzar a debuggear la celda con la definición. Hagámoslo ahora.
