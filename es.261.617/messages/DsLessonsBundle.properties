jupyter.onboarding.open.results.in.tab=Puedes previsualizar los resultados de ejecución de celdas de código en el área de salida. Haz clic en "{0}" para abrir el dataframe en una pestaña separada del editor.
jupyter.onboarding.press.run.below=Presiona {0} después de seleccionar el elemento deseado. Nota que hay varias otras acciones que contienen {1} y {2}, así que asegúrate de seleccionar la correcta.
