relaxng.convert-schema.advanced-options.dtd.tooltip.annotation-prefix=Los valores por defecto se representan usando un atributo de anotación prefix\:defaultValue donde prefix está vinculado a http\://relaxng.org/ns/compatibility/annotations/1.0 como se define en la especificación del comité de compatibilidad DTD de RELAX NG. Por defecto, Trang usará a como prefijo a menos que entre en conflicto con un prefijo usado en el DTD.
relaxng.convert-schema.advanced-options.dtd.tooltip.any-name=Especifica el nombre de la definición generada para el contenido de elementos declarados en el DTD como que tienen un modelo de contenido de ANY.
relaxng.convert-schema.advanced-options.dtd.tooltip.attlist-define=Esto especifica cómo construir el nombre de la definición que representa una declaración de lista de atributos a partir del nombre del elemento. El patrón de nombre debe contener exactamente un carácter de porcentaje. Este carácter de porcentaje se reemplaza por el nombre del elemento (después del reemplazo de dos puntos) y el resultado se usa como el nombre de la definición.
relaxng.convert-schema.advanced-options.dtd.tooltip.colon-replacement=Reemplaza los dos puntos en nombres de elementos por caracteres al construir los nombres de definiciones usadas para representar las declaraciones de elementos y declaraciones de listas de atributos en el DTD. Trang genera una definición para cada declaración de elemento y declaración de lista de atributos en el DTD. El nombre de la definición se basa en el nombre del elemento. En RELAX NG, los nombres de las definiciones no pueden contener dos puntos. Sin embargo, en el DTD, el nombre del elemento puede contener dos puntos. Por defecto, Trang primero intentará usar los nombres de elementos sin prefijos. Si esto causa un conflicto, en su lugar reemplazará los dos puntos por un carácter de nombre legal (primero intentará usar un punto).
relaxng.convert-schema.advanced-options.dtd.tooltip.element-define=Especifica cómo construir el nombre de la definición que representa una declaración de elemento a partir del nombre del elemento. El patrón de nombre debe contener exactamente un carácter de porcentaje. Este carácter de porcentaje se reemplaza por el nombre del elemento (después del reemplazo de dos puntos) y el resultado se usa como el nombre de la definición
relaxng.convert-schema.advanced-options.dtd.tooltip.generate-start=Especifica si Trang debe generar un elemento de inicio. Los DTD no indican qué elementos están permitidos como elementos de documento. Trang asume que todos los elementos que están definidos pero nunca referenciados están permitidos como elementos de documento.
relaxng.convert-schema.advanced-options.dtd.tooltip.inline-attlist=Especifica no generar definiciones para declaraciones de listas de atributos y en su lugar mover atributos declarados en declaraciones de listas de atributos a las definiciones generadas para declaraciones de elementos. Este es el comportamiento por defecto cuando el módulo de salida es xsd. De lo contrario, el comportamiento por defecto es como se describe en el parámetro -i no-inline-attlist.
relaxng.convert-schema.advanced-options.dtd.tooltip.strict-any=Preserva la semántica exacta de los modelos de contenido ANY usando una elección explícita de referencias a todos los elementos declarados. Por defecto, Trang usa un comodín que permite cualquier elemento.
