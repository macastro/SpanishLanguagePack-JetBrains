relaxng.convert-schema.advanced-options.xsd.tooltip.any-attribute-process-contents=Especifica el valor para el atributo processContents de cualquier elemento de atributo. \nEl valor por defecto es skip (correspondiente a la semántica de RELAX NG).
relaxng.convert-schema.advanced-options.xsd.tooltip.any-process-contents=Especifica el valor para el atributo processContents de cualquier elemento. \nEl valor por defecto es skip (correspondiente a la semántica de RELAX NG) a menos que el \nformato de entrada sea dtd, en cuyo caso el valor por defecto es strict (correspondiente a \nla semántica DTD).
relaxng.convert-schema.advanced-options.xsd.tooltip.disable-abstract-elements=Deshabilita el uso de elementos abstractos y grupos de sustitución \nen el esquema XML generado. Esto también se puede controlar usando \nun atributo de anotación.
