notification.gradle.legacy.firstLoad=Code insight está deshabilitado para evitar la configuración de build de Gradle.
notification.gradle.legacy.firstLoad.info=<div width\=400><p>La fase de configuración de Gradle necesita ejecutarse para obtener la Configuración del Script. La carga de la configuración del script está deshabilitada por defecto, ya que puede ser intensiva en recursos para proyectos Gradle grandes.</p><p>Haz clic en "Cargar Configuración" para evaluar el script Gradle Kotlin DSL.</p><p>Alternativamente, para cargar automáticamente la configuración cuando el script se abra por primera vez y recargarla cada vez que cambien los bloques de configuración del script de build, puedes habilitar "auto-reload" para todos los scripts. Esta opción no se recomienda para proyectos Gradle grandes con tiempos de configuración largos.</p></div>
notification.gradle.legacy.outsideProject=Code insight no disponible (proyecto Gradle relacionado no enlazado).
notification.gradle.legacy.outsideProject.addToStandaloneHelp=<div width\=400><p>El proyecto Gradle que evalúa este script necesita ser importado para que sea analizado por el IDE. Intenta reimportar el proyecto Gradle enlazado o enlaza un nuevo proyecto Gradle que evalúe este script.</p><p>Alternativamente, puedes añadirlo a scripts independientes, y su configuración se cargará automáticamente.</p><p><b>NOTA\:</b> Cada script independiente requiere que se ejecute una fase de configuración de Gradle separada en la actualización. Esto puede ser intensivo en recursos para proyectos Gradle grandes.</p></div>
notification.gradle.legacy.standalone.info=<div width\=400><p>El proyecto Gradle que evalúa este script no está importado en el IDE. <br/><p><b>NOTA\:</b> Cada script independiente requiere que se ejecute una fase de configuración de Gradle separada en la actualización. Esto puede ser intensivo en recursos para proyectos Gradle grandes.</p></div>
