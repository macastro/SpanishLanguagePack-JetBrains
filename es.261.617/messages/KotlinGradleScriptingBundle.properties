notification.notEvaluatedInLastImport.info=<div width\=400><p>El proyecto Gradle que evalúa este script necesita ser importado para que sea analizado por el IDE. Intenta reimportar el proyecto Gradle enlazado o enlaza un nuevo proyecto Gradle que evalúe este script.</p><p>Alternativamente, puedes añadirlo a scripts independientes, y su configuración se cargará por separado.</p><p><b>NOTA\:</b> Cada script independiente requiere que se ejecute una fase de configuración de Gradle separada en la actualización. Esto puede ser intensivo en recursos para proyectos Gradle grandes.</p></div>
