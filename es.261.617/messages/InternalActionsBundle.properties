ui.inspector.accessibility.audit.AccessibleActionNotNullInspection.description=La interfaz AccessibleAction debe implementarse para el rol "{0}". Esta interfaz permite que tecnologías asistivas como lectores de pantalla y control por voz ejecuten acciones sin interactuar directamente con el componente. Ejemplos típicos de acciones incluyen hacer clic en un botón, activar un checkbox o mostrar un menú contextual.\n\nCómo corregir\:\nAsegúrese de que el AccessibleContext del componente implemente la interfaz AccessibleAction y proporcione todas las acciones que el componente soporta.
ui.inspector.accessibility.audit.AccessibleEditableTextNotNullInspection.description=La interfaz AccessibleEditableText debe implementarse según el estado accesible "editable" y el rol "{0}". Esta interfaz permite que tecnologías asistivas como lectores de pantalla y control por voz interactúen con componentes de texto.\n\nCómo corregir\:\nAsegúrese de que el AccessibleContext del componente implemente la interfaz AccessibleEditableText. Si el componente no debe ser editable, asegúrese de que el método AccessibleContext.getAccessibleStateSet() no devuelva AccessibleState.EDITABLE.
ui.inspector.accessibility.audit.AccessibleNameAndDescriptionNotEqualInspection.description=Las propiedades de nombre y descripción accesibles no deben ser iguales. El nombre se usa para comunicar el propósito principal del componente, mientras que la descripción puede usarse para información adicional como instrucciones o comentarios.\n\nCómo corregir\:\nSi la descripción accesible duplica el nombre accesible y no hay información adicional apropiada para la descripción, mantenga solo el nombre. De lo contrario, divida el texto apropiadamente entre las dos propiedades.
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForFocusableComponentsInspection.description=El nombre accesible no debe estar vacío para componentes enfocables con rol "{0}". De lo contrario, los usuarios de tecnología asistiva pueden no poder interactuar con él. Por ejemplo, los usuarios de lectores de pantalla pueden no entender el propósito de este componente, y los usuarios de control por voz no pueden usar el nombre para activarlo.\n\nCómo corregir\:\nHay varias opciones\:\n1. Configure un nombre para el componente usando el método getAccessibleContext().setAccessibleName(), o sobrescriba el método getAccessibleName() en el AccessibleContext del componente.\n2. También puede configurar implícitamente el nombre accesible configurando el tooltip del componente o propiedades de texto, o usando el método JLabel.setLabelFor(Component).\n3. Si el componente es puramente decorativo y no tiene un nombre accesible apropiado, asegúrese de que no sea enfocable y que su rol accesible refleje correctamente su propósito.
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForIcon.description=Los iconos deben tener un nombre accesible que describa lo que representan. Esto permite que tecnologías asistivas como lectores de pantalla comuniquen correctamente el significado del icono a usuarios que no pueden identificarlo visualmente.\n\nCómo corregir\:\nConfigure un nombre accesible descriptivo para el icono usando el método getAccessibleContext().setAccessibleName(). Si el icono es puramente decorativo y no comunica información, el nombre accesible puede dejarse vacío.
ui.inspector.accessibility.audit.AccessibleStateSetContainsFocusableInspection.description=Este componente carece del estado accesible "focusable". Según el rol accesible "{0}", este componente debe ser enfocable por teclado para que los usuarios que dependen solo de la navegación por teclado puedan interactuar con él.\n\nCómo corregir\:\nAsegúrese de que el componente sea enfocable llamando al método setFocusable(true) del componente y verifique que sea accesible usando navegación Tab/Shift-Tab. Si el componente no es interactivo y no debe ser enfocable, considere cambiar su rol accesible a un rol no interactivo que refleje mejor su propósito, como panel o label.
ui.inspector.accessibility.audit.AccessibleTextNotNullInspection.description=La interfaz AccessibleText debe implementarse para el rol accesible "{0}". Esta interfaz permite que tecnologías asistivas como lectores de pantalla y control por voz accedan al contenido de texto del componente.\n\nCómo corregir\:\nAsegúrese de que el AccessibleContext del componente implemente la interfaz AccessibleText. Si el componente de texto es texto estático simple que no requiere interacción, considere cambiar el rol accesible a "label" y proporcione el contenido de texto en el nombre accesible.
ui.inspector.accessibility.audit.AccessibleValueNotNullInspection.description=La interfaz AccessibleValue debe implementarse para el rol accesible "{0}". Esta interfaz permite que tecnologías asistivas como lectores de pantalla determinen el valor del componente e interactúen con él.\n\nCómo corregir\:\nAsegúrese de que el AccessibleContext del componente implemente la interfaz AccessibleValue. Para componentes conmutables como checkboxes o botones de radio, el estado desactivado debe devolver valor 0 y el estado activado debe devolver valor 1.
ui.inspector.accessibility.audit.ComponentWithIconHasNonDefaultAccessibleNameInspection.description=Los componentes con iconos deben tener un nombre accesible que describa tanto el icono como el contenido de texto, no solo el texto, a menos que el icono sea puramente decorativo y no comunique información.\n\nCómo corregir\:\nConfigure un nombre accesible que describa tanto el icono como el texto usando el método getAccessibleContext().setAccessibleName(), o sobrescriba el método getAccessibleName() del AccessibleContext del componente.
ui.inspector.accessibility.audit.ImplementsAccessibleInterfaceInspection.description=Todos los componentes de UI deben implementar la interfaz Accessible para proporcionar metadatos de accesibilidad a tecnologías asistivas como lectores de pantalla y control por voz.\n\nCómo corregir\:\nImplemente la interfaz Accessible para el componente y proporcione una implementación AccessibleContext apropiada que describa el rol, estado y otras propiedades del componente. Para componentes puramente decorativos (como separadores), es posible no implementar la interfaz Accessible, pero aún se recomienda.
