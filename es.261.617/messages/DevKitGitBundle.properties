push.commit.intellij.platform.handler.name=Manejador de push de IntelliJ Monorepo
push.commit.intellij.platform.handler.title=Mencione una incidencia de YouTrack en el mensaje de commit
push.commit.intellij.platform.message.lacks.issue.reference.body=<html>Los commits enumerados a continuación modifican el código de los productos JetBrains IDE. Siga el formato del mensaje de commit (consulte el archivo README.md en la raíz del monorepo) y mencione en el mensaje de commit la incidencia de YouTrack que modifica la distribución del producto.<br/><br/> <a href="https://youtrack.jetbrains.com/newIssue">Cree</a> una incidencia o utilice cualquier ID de ticket de YT relacionado con el IDE.<br/><br/> </html>
push.commit.kotlin.build.tools.handler.name=Manejador de push de propiedad del código de Kotlin Build Tools
push.commit.kotlin.build.tools.message.lacks.issue.reference.body=<html>Los commits listados a continuación modifican el código de Kotlin Build Tools.<br/><br/>De acuerdo con las reglas del equipo de Kotlin Build Tools, todos los commits en su base de código deben pasar por una revisión previa obligatoria.<pre>{0}</pre> </html>
push.commit.kotlin.build.tools.review.title=Advertencia de propiedad de código de Kotlin Build Tools
push.commit.kotlin.notebook.handler.name=Manejador de push del plugin Kotlin Notebook
push.commit.message.lacks.issue.reference.body=<html>Los commits enumerados a continuación modifican el código fuente del complemento Kotlin IDE. Según las reglas del equipo del complemento, <a href=https://github.com/JetBrains/intellij-community/blob/master/plugins/kotlin/README.md#2-commits-requirements>todos los commits significativos</a> deben hacer referencia a incidencias de {0} en su mensaje. ¿Desea realizar el push tal cual?<pre>{1}</pre></html>
