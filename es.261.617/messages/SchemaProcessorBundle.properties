0.schema.message.prefix=[Amper]
schema.defaults.invalid.constant=Expresión predeterminada primitiva no válida: solo se permiten expresiones constantes simples
schema.defaults.invalid.enum=Expresión predeterminada de enumeración no válida: solo se permite el acceso directo a constantes de enumeración
schema.defaults.invalid.getter.block=El getter de propiedad predeterminado debe tener un cuerpo de expresión
schema.defaults.invalid.list=Expresión predeterminada de lista no válida: solo se permiten llamadas a `emptyList()` o `listOf(…)`
schema.defaults.invalid.map=Expresión predeterminada de mapa no válida: solo se permiten llamadas a `emptyMap()`
schema.defaults.invalid.object=No se admiten valores predeterminados explícitos para las interfaces @Configurable. Cada interfaz configurable no nula se instancia de forma predeterminada cuando se establecen todas sus propiedades.
schema.defaults.invalid.path=Todavía no se admiten valores predeterminados para `Path`
schema.defaults.redundant.null=No es necesario especificar `null` explícitamente: las propiedades que admiten valores nulos son null de forma predeterminada
schema.forbidden.context.receivers=No se permiten parámetros de contexto en las interfaces `@Configurable`
schema.forbidden.function=No se permiten funciones en las interfaces @Configurable
schema.forbidden.generics=No se permiten genéricos en las interfaces `@Configurable`
schema.forbidden.local=No se permiten interfaces `@Configurable` locales
schema.forbidden.mixins=Los supertipos para las interfaces `@Configurable` definidas por el usuario están reservados para un uso futuro
schema.forbidden.property.enabled=el nombre de propiedad `enabled` está reservado en la configuración del plugin (`{0}` se ha especificado como `settingsClass` en `module.yaml`)
schema.forbidden.property.extension=No se permiten propiedades de extensión en interfaces @Configurable
schema.forbidden.property.mutable=No se permiten propiedades mutables en interfaces @Configurable
schema.forbidden.property.override=No se admite la sobrescritura de propiedades en interfaces `@Configurable`
schema.forbidden.sealed=Las interfaces `@Configurable` selladas definidas por el usuario están reservadas para uso futuro
schema.forbidden.task.action.context.receivers=No se permiten parámetros de contexto en una función @TaskAction
schema.forbidden.task.action.extension=La función `@TaskAction` no puede ser una función de extensión
schema.forbidden.task.action.generic=La función @TaskAction no puede ser genérica
schema.forbidden.task.action.inline=La función @TaskAction no puede estar marcada como inline
schema.forbidden.task.action.overloads=Sobrecarga ilegal para `{0}`: las funciones @TaskAction no se pueden sobrecargar
schema.forbidden.task.action.return=La función `@TaskAction` debe devolver Unit
schema.forbidden.task.action.suspend=Aún no se admiten las funciones `@TaskAction` de tipo suspend
schema.must.be.public=La interfaz `@Configurable` debe ser pública
schema.not.interface=La declaración `@Configurable` debe ser una interfaz
schema.task.action.must.be.public=La función `@TaskAction` debe ser pública
schema.task.action.not.toplevel=La función `@TaskAction` debe ser una función de nivel superior
schema.task.action.parameter.not.path=las anotaciones `@Input`/`@Output` solo son aplicables a parámetros de tipos que hacen referencia a `Path`
schema.task.action.parameter.path.conflicting=No se pueden especificar las anotaciones @Input y @Output para un mismo parámetro. No se admiten las actualizaciones de archivos in-place. Use entradas y salidas independientes en su lugar.
schema.task.action.parameter.path.unmarked=El parámetro de un tipo que hace referencia a `Path` debe estar anotado con `@Input` o `@Output`
schema.type.forbidden.projection=No se permiten proyecciones de tipo en interfaces `@Configurable`
schema.type.map.key.unexpected=Solo se permite `String` como tipo de clave de `Map` en interfaces `@Configurable`
schema.type.unexpected=Tipo de esquema inesperado `{0}`.\nLos tipos admitidos son:\n - `Boolean`, `String`, `Int`, `Path`, enums\n - interfaz `@Configurable` (debe declararse en el mismo directorio de fuentes)\n - `List<T>`, `Map<String, T>`, donde `T` es un tipo admitido.