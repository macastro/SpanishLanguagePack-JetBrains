welcome.feature.ask.about.code.after.steps=<b>Consejo</b>\: {0} es consciente de la posición del cursor y el código seleccionado en el editor, archivo actual y pestañas abiertas.<br><br><b>Ejemplos de prompts</b>\:<ul><li>¿Qué hace <b>secretMethod</b>?<li>¿Dónde puedo encontrar <b>authorization</b> en mi proyecto?<li>Explica el código en el cursor.<li>¿Qué hace el código seleccionado?<li>Describe el código en mi archivo actual.<li>¿Qué archivos están abiertos?</ul>
welcome.feature.ask.about.code.steps=Selecciona un fragmento de código específico en el editor y haz clic derecho para abrir el menú contextual.<p>Selecciona <b>Acciones AI</b> y luego <b>Nuevo Chat Usando Selección</b>.
welcome.feature.ask.about.code.title=Preguntar sobre código del proyecto
welcome.feature.ask.about.local.changes.and.commits.beforeSteps=Puedes hacer preguntas relacionadas con VCS a {0}.<p><b>Ejemplos de prompts</b>\:<ul><li>¿Cuál fue el último commit?<li>Muéstrame el historial de commits.<li>Muéstrame la diferencia entre los últimos dos commits.<li>Muéstrame los cambios no confirmados.<li>¿Cuáles son los cambios salientes?</ul>
welcome.feature.ask.about.local.changes.and.commits.title=Preguntar sobre VCS
welcome.feature.ask.questions.before.steps=Puede hacer preguntas generales de programación a {0}.<br><br><b>Ejemplos de prompts\:</b><ul><li>¿Qué es el teorema CAP?<li>¿Cómo valido una dirección de correo electrónico usando regex?<li>¿Cómo genero enteros aleatorios dentro de un rango específico en Java?<li>Explique cómo escribir un archivo Docker eficiente para desplegar aplicaciones Spring Boot.<li>Proporcione instrucciones paso a paso sobre cómo crear una aplicación CRUD usando Ktor con API RESTful.</ul>
welcome.feature.ask.questions.title=Hacer preguntas de programación
welcome.feature.code.generation.steps=Coloca el cursor en cualquier lugar del editor o selecciona un fragmento de código y presiona {0}.<p>En el campo de entrada, escribe tu prompt y presiona <kbd>Enter</kbd>.<p>Para mejorar los resultados, escribe tu prompt de seguimiento en el campo de entrada y presiona <kbd>Enter</kbd>.<p>Acepta el código generado presionando <shortcut actionId\="ViewSource"/> o recházalo presionando <kbd>Esc</kbd>.
welcome.feature.code.generation.title=Generar código desde descripciones
welcome.feature.convert.to.another.language.steps=Abre un archivo que quieras convertir, coloca el cursor en el editor y haz clic derecho para abrir el menú contextual.<p>Selecciona <b>Acciones AI</b> y luego <b>Convertir Archivo a Otro Lenguaje</b>.<p>Selecciona el lenguaje al que quieres convertir el archivo actual.
welcome.feature.convert.to.another.language.title=Convertir a otro lenguaje
welcome.feature.craft.prompt.library.before.steps=Para crear sus propios prompts, puede\:<ul><li>Hacer clic derecho en el editor para abrir el menú contextual y luego ir a <b>Acciones de IA | Agregar sus prompts</b>.<li>Hacer clic en <icon src\="com.intellij.icons.AllIcons.Actions.MenuSaveall"/> <b>Guardar prompt actual</b> en el campo de entrada del chat de {0} para guardar su prompt.<li>O abrir la configuración y luego seleccionar <b>Herramientas | {0} | Biblioteca de prompts</b>.</ul><br><b>Consejo\:</b> Use la variable <b>$SELECTION</b> para agregar la selección de código actual al prompt.
welcome.feature.craft.prompt.library.title=Crear biblioteca de prompts
welcome.feature.ds.connection.agent.before.steps={0} puede crear conexiones de base de datos a través del chat.
welcome.feature.ds.connection.agent.steps=Abra <i>Chat de IA</i><p>Pida a {0} que se conecte a la base de datos y proporcione la información requerida<p>Revise la acción sugerida y ejecútela.
