welcome.feature.explain.code.afterSteps=Esto también funciona para expresiones regulares, consultas SQL, expresiones cron y otros fragmentos inyectados.
welcome.feature.explain.code.steps=Selecciona un fragmento de código y haz clic derecho para abrir el menú contextual.<p>Selecciona <b>Acciones AI</b> y luego <b>Explicar Código</b>.
welcome.feature.explain.code.title=Explicar código
welcome.feature.explain.commit.steps=Abra la <icon src\="com.intellij.icons.AllIcons.General.Vcs"/> <b>ventana de herramientas Git</b>.<p>En el panel de commits, seleccione uno o más commits para que {0} los explique.<p>Haga clic derecho y seleccione <b>Explicar commit con {0}</b> en el menú contextual.
welcome.feature.explain.commit.title=Explicar commits
welcome.feature.explain.runtime.error.title=Explicar errores de runtime
welcome.feature.explain.runtime.errors.before.steps=Si tienes un error de runtime\:
welcome.feature.explain.runtime.errors.steps=Haz clic en <icon src\="com.intellij.llmInstaller.LLMInstallerAIAssistantBrandingIcons.Logo16"/> <b>Explicar con AI</b> en la consola.<p>Alternativamente, selecciona el mensaje de error, abre el menú contextual y haz clic en <b>Explicar mensaje de error con AI</b>.
welcome.feature.find.potential.problems.steps=Selecciona un fragmento de código y haz clic derecho para abrir el menú contextual.<p>Selecciona <b>Acciones AI</b> y luego <b>Encontrar Problemas</b>.
welcome.feature.find.potential.problems.title=Encontrar errores y sugerir correcciones
welcome.feature.generate.commit.messages.after.steps=<b>Personalización de prompts</b>\:<br>Abre la configuración de commit en la esquina inferior derecha del campo de mensaje de commit.<p>Alternativamente, ve a <b>Configuración | Herramientas | {0} | Biblioteca de Prompts | Generación de Mensajes de Commit</b>.
welcome.feature.generate.commit.messages.before.steps=Si tienes cambios\:
welcome.feature.generate.commit.messages.steps=Abre la <icon src\="com.intellij.icons.AllIcons.Actions.Commit"/> <b>ventana de herramientas Commit</b>.<p>Haz clic en <icon src\="com.intellij.llmInstaller.LLMInstallerAIAssistantBrandingIcons.Logo16"/> <b>Generar Mensaje de Commit con {0}</b>.
welcome.feature.generate.commit.messages.title=Generar mensajes de commit
welcome.feature.inline.code.completion.after.steps=También puedes invocar la completación de código manualmente presionando <shortcut actionId\="CallInlineCompletionAction"/>.<p><b>Consejo</b>\: Pasa el cursor sobre la sugerencia de código para cambiar la tecla que acepta las sugerencias de {0}.
welcome.feature.inline.code.completion.steps=Comienza a escribir en el editor para obtener sugerencias instantáneas.<p>Para aceptar el código sugerido, presiona <shortcut actionId\="InsertInlineCompletionAction"/>.<p>Para rechazar la sugerencia, presiona <kbd>Esc</kbd>.
welcome.feature.inline.code.completion.title=Completar código
welcome.feature.name.suggestions.steps=Coloca el cursor en lo que quieres renombrar.<p>Haz clic derecho para abrir el menú contextual, selecciona <b>Refactorizar</b> y luego <b>Renombrar</b>.
welcome.feature.name.suggestions.title=Sugerir nombres
welcome.feature.refactoring.suggestions.afterSteps=<b>Consejo\:</b> Puedes usar esta y otras <b>Acciones AI</b> sin seleccionar un fragmento específico de código. Coloca el cursor en la clase o método deseado, elige la acción AI y selecciona el fragmento de código requerido.
welcome.feature.refactoring.suggestions.steps=Selecciona un fragmento de código y haz clic derecho para abrir el menú contextual.<p>Selecciona <b>Acciones AI</b> y luego <b>Sugerir Refactoring</b>.<p>En el campo con el código refactorizado, haz clic en <b>Mostrar Diferencias</b> para abrir el visor de diferencias.
welcome.feature.refactoring.suggestions.title=Sugerir refactorizaciones
welcome.feature.reference.files.before.steps=Realiza consultas específicas dentro de tu proyecto.<br><br><b>Ejemplos de prompts</b>\:<ul><li>¿Dónde hay un error off-by-one en <b>\#thisFile</b>?<li>¿Cuál de mis <b>\#localChanges</b> ha introducido un error off-by-one?<li>¿Dónde hay un error off-by-one en <b>\#file\:Foo.kt</b>?<li>¿Dónde hay un error off-by-one en <b>\#symbol\:Foo</b>?<li>¿Qué valor tiene <b>\#jupyter_var\:foo</b>?</ul>
welcome.feature.reference.files.title=Referenciar archivos
welcome.feature.sql.ask.insights.before.steps=Dado que el chat de {0} conoce tu schema, puedes hacer preguntas sobre los objetos de tu base de datos. Ejemplos de prompts\:<ul><li><i>¿Qué tablas contienen columnas con tipo BLOB?</i><li><i>¿A qué tablas está conectada <code>film_actor</code> a través de claves foráneas?</i><li><i>¿Qué tablas están particionadas?</i><li><i>¿Qué tablas no tienen claves primarias?</i></ul>
welcome.feature.sql.ask.insights.title=Pedir insights sobre tu base de datos
welcome.feature.sql.attach.schema.before.steps=Puedes mejorar la calidad de las consultas SQL generadas proporcionando el contexto del schema de la base de datos con la que estás trabajando.
welcome.feature.sql.attach.schema.steps=Abre el chat AI.<p>Adjunta el schema con ayuda de la lista desplegable.<p>{0} obtendrá acceso a la estructura del schema adjunto, proporcionando información sobre él al LLM.<p>Comienza a chatear.
welcome.feature.sql.attach.schema.title=Adjuntar un schema para mejorar la interacción
welcome.feature.sql.correct.syntax.steps=Coloca el cursor en el error de sintaxis en tu código SQL.<p>Selecciona <i>Acciones AI</i> y luego <i>Corregir Problema SQL</i>.<p>El código será corregido en el editor.<p>Usa la acción <i>Deshacer</i> si no estás satisfecho con el resultado.
welcome.feature.sql.correct.syntax.title=Corregir tu sintaxis SQL
welcome.feature.sql.create.prompt.library.after.steps=<b>Consejo</b>\: Puedes usar la variable <code>$SELECTION$</code> para agregar la selección de código actual al prompt.<br/><br/>Ejemplos de prompts\:<ul><li><i>Convierte este SQL al dialecto PostgreSQL.</i><li><i>Escribe código Python que duplique la funcionalidad de esta consulta.</i><li><i>Refactoriza este SQL\: reemplaza subconsulta con CTE.</i><li><i>Agrega alias a todas las tablas en esta consulta.</i></ul>
welcome.feature.sql.create.prompt.library.steps=Haz clic derecho en el editor para abrir el menú contextual y luego ve a <i>Acciones AI</i> | <i>Agregar Tus Prompts</i>.<p>Haz clic en <i>Guardar Prompt Actual</i> en el campo de entrada del chat de {0} para guardar tu prompt.<p>Alternativamente, abre la configuración y luego selecciona <i>Herramientas</i> | <i>{0}</i> | <i>Biblioteca de Prompts</i>.
welcome.feature.sql.create.prompt.library.title=Crear una biblioteca de prompts
welcome.feature.sql.explain.queries.after.steps=<b>Consejo</b>\: Esto también funciona para expresiones regulares, fragmentos de Python y otros fragmentos de código.
welcome.feature.sql.explain.queries.steps=Coloca el cursor en una consulta y haz clic derecho para abrir el menú contextual.<p>Selecciona <i>Acciones AI</i> y luego <i>Explicar Código</i>.
welcome.feature.sql.explain.queries.title=Explicar consultas
welcome.feature.sql.generate.by.nl.request.steps=Coloca el cursor en cualquier lugar del editor o selecciona un fragmento de código y presiona <shortcut actionId\="AIAssistant.Editor.ForceGenerateCodeInEditor"/>.<p>En el campo de entrada, escribe tu prompt para la consulta y presiona <kbd>Enter</kbd>.<p>Para ajustar los resultados, escribe un prompt de seguimiento en el campo de entrada y presiona <kbd>Enter</kbd>.<p>Acepta la consulta generada presionando {0} o recházala presionando <kbd>Esc</kbd>.
welcome.feature.sql.generate.by.nl.request.title=Generar consultas SQL basadas en solicitudes en lenguaje natural
welcome.feature.sql.optimize.query.before.steps=Puedes enviar una consulta al chat AI junto con el resultado de usar <i>Explain Plan</i> en la consulta, y {0} te ofrecerá posibles optimizaciones.
welcome.feature.sql.optimize.query.steps=Adjunte el esquema al chat\: el contexto ayudará a {0} a optimizar su consulta.<p>Elabore un prompt con una solicitud de optimización, incluyendo la consulta, el resultado del <i>Plan de explicación</i> y la solicitud.<p>Pegue el refactoring sugerido y pruébelo.
welcome.feature.sql.optimize.query.title=Solicitar optimización de consultas
welcome.feature.sql.use.correct.objects.before.steps={0} maneja perfectamente el mal uso de objetos de base de datos. Conociendo el schema de la base de datos, puede detectar qué objeto debías usar.
welcome.feature.sql.use.correct.objects.steps=Coloca el cursor en el error de sintaxis en tu código SQL.<p>Selecciona <i>Acciones AI</i> y luego <i>Corregir Problema SQL</i>.<p>El código será corregido en el editor.<p>Usa la acción <i>Deshacer</i> si no estás satisfecho con el resultado.
