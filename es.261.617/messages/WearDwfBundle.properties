inspection.feature.requires.higher.wff.version.description=<html>Algunas funciones requieren una versión mínima de Watch Face Format.<br/>Obtén más información en la documentación de <a href="https://developer.android.com/training/wearables/wff/features">funciones</a>.</html>
inspection.invalid.color.index.description=<html>Una configuración de color puede tener varios colores como parte de una paleta. Si hay varios colores, la referencia de configuración debe especificar el índice de un color dentro de esa paleta. Por ejemplo: [CONFIGURATION.myColor.0]. Si la paleta tiene solo un color, entonces el índice es opcional.<br/>Obtenga más información en la documentación de <a href="https://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a>.</html>
inspection.invalid.color.index.invalid.index.in.range=El índice de color debe ser un número entero en el rango {0}
inspection.invalid.color.index.invalid.index.optional=El índice de color es opcional y debe ser 0 si se especifica
inspection.invalid.color.index.missing.colors=La configuración de color debe declarar al menos un color en un ColorOption
inspection.invalid.color.index.missing.index=Se debe especificar un índice de color en el rango {0}
inspection.invalid.complication.data.source.location.available.complication.types=Esta fuente de datos de complicaciones solo se puede utilizar en complicaciones de los siguientes tipos: {0}
inspection.invalid.complication.data.source.location.description=<html>Una fuente de datos de complicaciones solo puede utilizarse bajo una etiqueta <code>&lt;Complication&gt;</code> dentro de una esfera de reloj declarativa. Las fuentes de datos de complicaciones disponibles dependen del tipo de complicación.<br/>Obtenga más información en la documentación de <a href="https://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a>.</html>
inspection.invalid.complication.data.source.location.missing.tag=Las fuentes de datos de complicación deben usarse dentro de una etiqueta <Complication>
