go.new.features.ignore.directive.what.it.does=¿Qué hace la directiva {0}? La directiva ignore indica a las herramientas de Go que no utilicen el código de estas carpetas al compilar o probar la aplicación. Oculta esas carpetas de comandos como: {1}, {2}, {3}.\n{4}: pero las carpetas ignoradas siguen formando parte de su módulo y los archivos de estas carpetas se seguirán incluyendo cuando alguien descargue su módulo (por ejemplo, mediante {5} o en un archivo ZIP del módulo).
go.new.features.ignore.directive.why.to.use.it=Utilice la directiva {2} para excluir carpetas que no sean código Go o que no deban compilarse. Por ejemplo, código frontend como el de las carpetas {0} o {1}, o bibliotecas de JavaScript. Actualmente, la directiva {2} está vacía. Ejecutemos y comprobemos la salida de {3} en la ventana de herramientas {4}. {3} enumera todos los paquetes de Go de nuestro módulo.\nPresione {5} para abrir la terminal.
