go126.errors.astype.intro={0} es una versión genérica de {1}. Devuelve un resultado tipado. Esto hace que el código sea más fácil de leer y más confiable.
go126.errors.astype.run.result={0} requiere que el segundo argumento sea un puntero a un tipo de error o a una interfaz. Esto provoca un pánico porque {1} no es un tipo de puntero que implemente error.\n{2} elimina toda esta clase de errores al inferir el tipo correcto automáticamente y devolver un valor con el tipo adecuado sin necesidad de manipular punteros. No puede provocar un pánico debido a un tipo de destino incorrecto, ya que no depende de que el llamador prepare un puntero con la forma adecuada. También evita la reescritura de punteros basada en reflexión utilizada por {0}, lo que lo hace más rápido y seguro de usar en la mayoría de los casos.
go126.errors.astype.title=Versión genérica de 'errors.As'
