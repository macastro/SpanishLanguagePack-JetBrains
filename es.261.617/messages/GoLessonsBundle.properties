go126.faster.memory.allocation.intro=Go 1.26 introduce versiones especializadas de su función de asignación de memoria para objetos pequeños (de 1 a 512 bytes). Utiliza tablas de salto para elegir rápidamente la función adecuada para cada tamaño.
