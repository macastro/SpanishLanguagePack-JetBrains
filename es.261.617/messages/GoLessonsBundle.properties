go126.recursive.type.constraints.note=Para este ejemplo, debe alternar entre Go 1.25 y Go 1.26. Para aprender cómo cambiar la versión del SDK de Go, consulte la <a href="https://www.jetbrains.com/help/go/create-new-go-project.html#installing-go-sdk">documentación de GoLand</a>.\n <callback id="{0}">Haga clic aquí</callback> para cambiar a Go {1} o a una versión anterior, luego haga clic en el editor para devolver el foco al IDE.
