go126.goroutine.leak.profiles.check.results=El código crea deliberadamente fugas de goroutines al iniciar goroutines que se bloquean indefinidamente mientras esperan recibir datos de un canal. Dado que el canal nunca se cierra ni se escribe en él, estas goroutines nunca pueden completarse. El programa expone el punto de conexión {0} para que pueda inspeccionar las goroutines filtradas a través de la interfaz HTTP pprof.\nHaga clic en el enlace del servidor en la salida.
go126.goroutine.leak.profiles.intro=El perfil de fuga de goroutines es una nueva función experimental de perfilado que ayuda a encontrar goroutines que nunca terminan. Se habilita compilando el programa con {0}, lo que también expone un nuevo endpoint {1} en {2}.\nEl runtime busca goroutines bloqueadas en canales, mutexes u otras primitivas de concurrencia que ya no son alcanzables desde goroutines ejecutables. Esto permite detectar problemas como goroutines bloqueadas permanentemente en operaciones de canal, como se muestra en este ejemplo donde varias goroutines esperan en un canal en el que nunca se escribe. El equipo de Go planea habilitarlo por defecto en Go 1.27.
go126.goroutine.leak.profiles.run=Copia el comando resaltado en el editor y pégalo en la terminal. Presiona {0}. Espera hasta que veas {1} en la línea de comandos.
go126.goroutine.leak.profiles.title=Perfiles de fuga de goroutines
go126.goroutine.metrics.intro=Go 1.26 añade nuevos contadores {0} que realizan un seguimiento de las goroutines en diversos estados: created, live, runnable, running, waiting, not-in-go, además de hilos del runtime.
go126.goroutine.metrics.results=Revise los contadores impresos. Este ejemplo muestra cómo las nuevas métricas de goroutines reflejan diferentes estados de ejecución: el contador created aumenta a medida que se inician nuevas goroutines, el contador waiting crece porque algunas goroutines están bloqueadas por un mutex o están en reposo, los contadores runnable y running reflejan una goroutine que se está ejecutando activamente, el contador syscall o cgo permanece bajo porque no hay goroutines bloqueadas en llamadas al sistema y la métrica de hilos live informa cuántos hilos del SO son propiedad del runtime actualmente.
go126.goroutine.metrics.run=Ejecute el ejemplo para imprimir las nuevas métricas. Haga clic derecho en el editor y seleccione {0} o {1}, según el menú contextual.
go126.goroutine.metrics.title=Métricas de goroutines
