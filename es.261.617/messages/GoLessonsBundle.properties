go.new.features.synctest.summary=El paquete {0} ayuda a probar código concurrente: código que utiliza goroutines, temporizadores o sleeps.\nPermite ejecutar pruebas en un entorno controlado (llamado "burbuja") utilizando un reloj simulado en lugar de esperar en tiempo real. Veamos el ejemplo.
go.new.features.synctest.title=Pruebe el código concurrente más rápido
go.new.features.testing.package.attributes=La primera mejora que notará en la ventana de herramientas {0} es la posibilidad de adjuntar atributos de clave-valor a los casos de prueba. Esto puede ser útil para etiquetar una ejecución de prueba con metadatos personalizados (como la versión, la entrada o el contexto) o para mejorar el filtrado y la legibilidad del registro de pruebas.\nPara generar estas etiquetas, utilizamos el siguiente código: {1}. Las líneas que producen resultados en la ventana de herramientas {0} se resaltan en el editor.
go.new.features.testing.package.delete=Eliminar el código seleccionado.
go.new.features.testing.package.intro=Go 1.25 introduce varias mejoras pequeñas pero útiles en el paquete {0}, lo que hace que los registros de prueba sean más limpios y la depuración resulte más sencilla, especialmente en suites de pruebas grandes o paralelas.
go.new.features.testing.package.output=Desplázate hacia abajo en la ventana de herramientas {0}. Verás que ahora es posible generar una salida sin referencias de archivo ni línea, a diferencia de la salida producida por la función {1}. El nuevo método {2} devuelve un {3} que escribe directamente en la salida de la prueba.\nHaz clic en el enlace {4} para navegar al código que utiliza el enfoque estándar {1}; debajo de esta línea, encontrarás el nuevo enfoque {2}.
go.new.features.testing.package.parallel=Otra actualización importante es el uso de {0} con {1}. Anteriormente, ejecutar {1} durante la ejecución de pruebas en paralelo podía producir resultados poco fiables. Ahora, este código provocará un panic.\nPresione {2} para descomentar la siguiente línea: {3}
go.new.features.testing.package.rerun=Haga clic en el icono resaltado en el margen y seleccione {0} para volver a ejecutar la prueba.
go.new.features.testing.package.run=Ejecutemos todo el conjunto de pruebas para ver estas mejoras. Haga clic con el botón derecho en el icono resaltado del margen y seleccione {0}.\nRevise los resultados en la ventana de herramientas {1}.
go.new.features.testing.package.title=Otras actualizaciones en el paquete 'testing'
go.new.features.typeassert.intro=Go 1.25 introduce una nueva función en el paquete {0}: {1}. Esta función permite extraer valores de {2} de forma más eficiente, sin necesidad de llamar primero a {3}.
go.new.features.typeassert.new.way=Ahora observe la función {0}, que utiliza una conversión directa sin asignación de memoria adicional. Es como abrir una caja misteriosa y saber al instante qué hay dentro, sin tener que sacarlo, hacer una copia y examinarlo.
go.new.features.typeassert.old.way=Imagine que tiene una caja misteriosa que puede contener diferentes tipos de elementos: podría ser una cadena, un número o información sobre una persona. La aserción de tipo es una forma de averiguar qué hay dentro de la caja y gestionarlo adecuadamente.\nObserve la función {0}. Utiliza {1} para comprobar qué tipo de elemento hay dentro. En este enfoque, el elemento primero se extrae de la caja misteriosa y se copia antes de examinar su tipo.
go.new.features.typeassert.run=Ejecutemos la aplicación. Haga clic con el botón derecho en cualquier lugar del editor y seleccione el elemento de menú resaltado que indica {0}.\nUna vez finalizada la aplicación, compare la diferencia de rendimiento entre los dos métodos.
go.new.features.typeassert.title=Conversión directa de valores
