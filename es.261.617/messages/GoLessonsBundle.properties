go126.NewMultiHandler.intro=Este programa muestra el registro fan-out con {0}log/slog.NewMultiHandler. La parte clave es el multi-handler, que envía cada registro de log a varios handlers simultáneamente: un handler de consola envuelto en un handler de anonimización, un handler de archivos JSON sin anonimización y un handler de consola simple.\nGracias a {1}NewMultiHandler, una única llamada de log se escribe en varias salidas en paralelo. De este modo, puede combinar diferentes comportamientos de registro, como la anonimización de valores sensibles solo en la salida de consola mientras mantiene los datos completos en un archivo, sin duplicar las llamadas de registro en su código.
go126.NewMultiHandler.title=Registro de logs con 'slog.NewMultiHandler'
go126.cryptotest.artifacts.explanation={0} es una característica de prueba de Go 1.26 que proporciona un lugar estándar para almacenar artefactos de prueba, como archivos, registros, instantáneas o datos generados. En esta prueba, la clave pública generada se escribe en un archivo dentro del directorio de artefactos. Al ejecutar pruebas con {1}, estos archivos se conservan en lugar de eliminarse. Esto es importante porque facilita la depuración de fallos, permite que los sistemas de CI recopilen salidas automáticamente y elimina la necesidad de gestionar directorios temporales personalizados.
go126.cryptotest.artifacts.title=Artefactos de prueba y pruebas criptográficas deterministas
go126.cryptotest.cryptotest.explanation={0} es una característica de Go 1.26 de {1}. Reemplaza toda la aleatoriedad criptográfica utilizada por los paquetes {2} y {3} con una fuente determinista durante la duración de la prueba. En nuestro código, la llamada {4} garantiza que {5} siempre produzca la misma clave en cada ejecución. Esto es importante porque las pruebas criptográficas solían ser inestables e imposibles de validar con precisión. Ahora puede escribir aserciones estables, reproducir fallos y confiar en los resultados de CI.
go126.cryptotest.goto.file=Ahora naveguemos al archivo generado. Presione {0} para buscar archivos. Escriba {1} en el campo de búsqueda. Seleccione el archivo {2} de la lista de resultados encontrados.
