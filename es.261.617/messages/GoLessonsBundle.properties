go126.faster.cgo.syscall.intro=Go 1.26 mejora el rendimiento de cgo y las llamadas al sistema optimizando la forma en que el runtime realiza el seguimiento de las goroutines. Se ha eliminado el estado del procesador {0}, lo que reduce la sobrecarga interna.
