vm.option.add.exports.description=Actualiza \\&lt;module\\&gt; para exportar \\&lt;package\\&gt; a \\&lt;target-module\\&gt;, independientemente de la declaración del módulo. \\&lt;target-module\\&gt; puede ser ALL-UNNAMED para exportar a todos los módulos sin nombre.
vm.option.add.modules.description=Especifica los módulos raíz a resolver además de los módulos iniciales.
vm.option.add.opens.description=Actualiza \\&lt;module\\&gt; para abrir \\&lt;package\\&gt; en \\&lt;target-module\\&gt;, independientemente de la declaración del módulo.
vm.option.add.reads.description=Actualiza \\&lt;module\\&gt; para leer \\&lt;target-module\\&gt;, independientemente de la declaración del módulo. \\&lt;target-module\\&gt; puede ser ALL-UNNAMED para leer todos los módulos sin nombre.
vm.option.advanced.option.description=Especifica una opción no estándar específica de la JVM.
vm.option.agentlib.description=Carga la biblioteca de agente nativo mediante \\&lt;libname\\&gt;.
vm.option.agentpath.description=Carga la biblioteca de agentes nativos mediante \\&lt;pathname\\&gt;.
vm.option.annotation.processing.description=Especifica las opciones que se pasarán a los procesadores de anotaciones.
vm.option.batch.description=Desactiva la compilación en segundo plano.
vm.option.boot.classpath.description=Sobrescribe la ubicación de los archivos de clase de bootstrap.
vm.option.bootclasspath.a.description=Añade al final de la ruta de clases de bootstrap.
vm.option.bootclasspath.a.javac.description=Añade un sufijo a la ruta de clase de arranque.
vm.option.bootclasspath.description=Establece la ruta de búsqueda para las clases y recursos de bootstrap.
vm.option.bootclasspath.javac.description=Sobrescribe la ubicación de los archivos de clase de bootstrap.
vm.option.bootclasspath.p.description=Añade al principio de la ruta de clases de arranque.
vm.option.bootclasspath.p.javac.description=Añade un prefijo a la ruta de clases de arranque.
vm.option.check.jni.description=Realiza comprobaciones adicionales para las funciones JNI.
vm.option.classpath.description=Especifica dónde encontrar los archivos de clase de usuario y los procesadores de anotaciones.
vm.option.comp.description=Fuerza la compilación de métodos en la primera invocación.
vm.option.debug.description=No realiza ninguna acción. Se proporciona por compatibilidad con versiones anteriores.
vm.option.default.module.for.created.files.description=Especifica el módulo de destino de reserva para los archivos creados por procesadores de anotaciones si no se especifica o infiere ninguno.
vm.option.deprecation.description=Habilita o deshabilita el procesamiento de las advertencias de obsolescencia.
vm.option.diag.description=Muestra mensajes de diagnóstico adicionales.
vm.option.diags.description=Selecciona un modo de diagnóstico.
vm.option.directory.description=Establece el directorio de destino (o el directorio de salida de clases) para los archivos de clase.
vm.option.disable.assertions.description=Habilita aserciones con la granularidad especificada.
vm.option.disable.files.description=Desactiva la expansión posterior de archivos de argumentos.
vm.option.disable.line.doc.comments.description=Deshabilita el soporte para los comentarios de documentación con líneas que comienzan por ///.
vm.option.disable.system.assertions.description=Desactiva las aserciones del sistema.
vm.option.doclint.description=Habilita las comprobaciones recomendadas para problemas en los comentarios de documentación.
vm.option.doclint.groups.description=Habilita o deshabilita grupos específicos de comprobaciones en los comentarios de documentación.
vm.option.doclint.package.description=Habilita o deshabilita las comprobaciones en paquetes específicos.
vm.option.enable.assertions.description=Habilita las aserciones con la granularidad especificada.
vm.option.enable.preview.description=Habilita las funciones de lenguaje en vista previa. Se utiliza en combinación con -source o --release.
vm.option.enable.system.assertions.description=Habilita las aserciones del sistema.
vm.option.encoding.description=Especifica la codificación de caracteres utilizada por los archivos fuente, como EUC-JP y UTF-8.
vm.option.endorsed.dirs.description=Sobrescribe la ubicación de la ruta de los estándares aprobados.
vm.option.extension.dirs.description=Sobrescribe la ubicación de las extensiones instaladas.
vm.option.finalization.description=Controla si la JVM realiza la finalización de objetos, donde \\&lt;value\\&gt; es "enabled" o "disabled". La finalización está habilitada de forma predeterminada.
vm.option.future.description=Habilita las comprobaciones más estrictas, anticipando el valor predeterminado futuro. Esta opción está en desuso y puede ser eliminada en una versión futura.
vm.option.generate.choice.debug.information.description=Genera solo los tipos de información de depuración especificados por la lista de palabras clave separadas por comas.
vm.option.generate.debug.information.description=Genera toda la información de depuración, incluyendo las variables locales.
vm.option.generate.none.debug.information.description=No genera información de depuración.
vm.option.help.description=Muestra una sinopsis de las opciones estándar.
vm.option.help.extra.description=Imprime una sinopsis del conjunto de opciones adicionales.
vm.option.help.lint.description=Muestra las claves admitidas para la opción -Xlint.
vm.option.illegal.access.description=Permite o deniega el acceso a miembros de tipos en módulos con nombre por parte de código en módulos sin nombre. \\&lt;value\\&gt; es uno de "deny", "permit", "warn" o "debug". Esta opción se eliminará en una versión futura.
vm.option.implicit.description=Especifica si se deben generar o no archivos de clase para los archivos referenciados implícitamente.
vm.option.incgc.description=Habilita la recolección de basura incremental.
vm.option.int.description=Ejecuta la aplicación en modo de solo interpretación.
vm.option.internalversion.description=Muestra información de la versión de la JVM más detallada que la opción -version.
vm.option.j.description=Pasa la opción al sistema de tiempo de ejecución.
vm.option.javaagent.description=Carga el agente del lenguaje de programación Java mediante \\&lt;jarpath\\&gt;.
vm.option.limit.modules.description=Limita el universo de módulos observables.
vm.option.limit.modules.javac.description=Limita el universo de módulos observables.
vm.option.log.description=Configura o habilita el registro con el marco de registro unificado de la Máquina Virtual Java (JVM). Use -Xlog:help para obtener más detalles.
vm.option.loggc.description=Registra el estado de GC en un archivo con marcas de tiempo. Esta opción está en desuso y podría eliminarse en una versión futura. Se sustituye por -Xlog:gc:\\&lt;file\\&gt;.
vm.option.maxerrs.description=Establece el número máximo de errores a mostrar.
vm.option.maxwarns.description=Establece el número máximo de advertencias a imprimir.
vm.option.mixed.description=Ejecución en modo mixto (predeterminado).
vm.option.mn.description=Establece el tamaño inicial y máximo (en bytes) del heap para la generación joven (nursery).
vm.option.module.description=Compila los archivos de origen en los módulos con nombre que sean más recientes que los archivos correspondientes en el directorio de salida.
vm.option.module.path.description=Especifica dónde encontrar los módulos de aplicación.
vm.option.module.source.path.description=Especifica dónde encontrar los archivos fuente al compilar código en múltiples módulos.
vm.option.module.version.description=Especifica la versión de los módulos que se están compilando.
vm.option.ms.description=Establece el tamaño inicial del heap de Java.
vm.option.mx.description=Establece el tamaño máximo del heap de Java.
vm.option.native.header.description=Especifica dónde colocar los archivos de encabezado nativos generados.
vm.option.noclassgc.description=Deshabilita la recolección de basura de clases.
vm.option.nowarn.description=Desactiva los mensajes de advertencia (equivalente a -Xlint:none).
vm.option.parameters.description=Genera metadatos para la reflexión sobre los parámetros del método.
vm.option.patch.module.description=Sobrescribe o amplía un módulo con clases y recursos en archivos JAR o directorios.
vm.option.patch.module.javac.description=Sobrescribe o amplía un módulo con clases y recursos en archivos JAR o directorios.
vm.option.pkginfo.description=Especifica cuándo y cómo javac genera los archivos package-info.class.
vm.option.plugin.description=Especifica el nombre y los argumentos opcionales de un plug-in para ejecutar.
vm.option.prefer.description=Especifica qué archivo leer cuando se encuentran tanto un archivo de origen como un archivo de clase para una clase compilada implícitamente.
vm.option.print.description=Imprime una representación textual de los tipos especificados con fines de depuración.
vm.option.print.processor.info.description=Imprime información sobre las anotaciones que se solicita procesar a un procesador.
vm.option.print.rounds.description=Imprime información sobre las rondas de procesamiento de anotaciones.
vm.option.proc.description=Controla el procesamiento de anotaciones y la compilación: none (compilación sin procesamiento de anotaciones), only (solo procesamiento de anotaciones) o full (procesamiento de anotaciones y compilación).
vm.option.processor.description=Nombres de los procesadores de anotaciones que se van a ejecutar.
vm.option.processor.module.path.description=Especifica la ruta de módulos utilizada para buscar procesadores de anotaciones.
vm.option.processor.path.description=Especifica dónde encontrar los procesadores de anotaciones.
vm.option.prof.description=Genera datos de perfilado de CPU.
vm.option.profile.description=Comprueba que la API utilizada esté disponible en el perfil especificado.
vm.option.release.description=Compila el código fuente según las reglas del lenguaje de programación Java para una versión específica de Java SE y genera archivos de clase destinados a esa versión.
vm.option.rs.description=Reduce el uso de señales del sistema operativo por parte de Java/VM (consulte la documentación).
vm.option.share.auto.description=Utiliza datos de clase compartidos si es posible (predeterminado).
vm.option.share.off.description=No intenta utilizar datos de clases compartidos.
vm.option.share.on.description=Requiere el uso de datos de clase compartidos; de lo contrario, fallará. Esta es una opción de prueba y puede causar fallos intermitentes. No debe utilizarse en entornos de producción.
vm.option.showSettings.all.description=Muestra todos los ajustes y continúa.
vm.option.showSettings.description=Muestra todos los ajustes y continúa.
vm.option.showSettings.locale.description=Muestra todos los ajustes relacionados con la configuración regional y continúa.
vm.option.showSettings.properties.description=Muestra todas las configuraciones de propiedades y continúa.
vm.option.showSettings.system.description=(Solo Linux) Muestra la configuración del sistema host o del contenedor y continúa.
vm.option.showSettings.vm.description=Muestra todos los ajustes relacionados con la VM y continúa.
vm.option.source.description=Establece la \\&lt;versión\\&gt; de la fuente en el modo de archivo fuente.
vm.option.source.output.description=Especifica el directorio utilizado para colocar los archivos de código fuente generados.
vm.option.source.path.description=Especifica dónde encontrar los archivos fuente.
vm.option.source.release.description=Compila el código fuente de acuerdo con las reglas del lenguaje de programación Java para la versión de Java SE especificada.
vm.option.ss.description=Establece el tamaño de la pila de hilos de Java. El tamaño real puede redondearse a un múltiplo del tamaño de página del sistema según lo requiera el sistema operativo.
vm.option.stdout.description=Redirige la salida estándar a un archivo.
vm.option.system.description=Sobrescribe la ubicación de los módulos del sistema.
vm.option.system.property.description=Establece una propiedad del sistema en el formato \\&lt;name\\&gt;=\\&lt;value\\&gt;.
vm.option.target.description=Genera archivos de clase adecuados para la versión de Java SE especificada. La versión de destino debe ser igual o superior a la versión de origen.
vm.option.upgrade.module.path.description=Sobrescribe la ubicación de los módulos actualizables.
vm.option.verbose.description=Muestra mensajes sobre lo que está haciendo el compilador, incluyendo información sobre cada clase cargada y cada archivo fuente compilado.
vm.option.verify.description=Establece el modo del verificador de bytecode. Tenga en cuenta que la opción -Xverify:none está en desuso y puede eliminarse en una versión futura.
vm.option.version.description=Muestra la información de la versión.
vm.option.werror.description=Finaliza la compilación cuando se producen advertencias.
vm.option.xlint.description=Habilita todas las advertencias recomendadas.
vm.option.xlint.keys.description=Habilita y/o deshabilita categorías de advertencia específicas.