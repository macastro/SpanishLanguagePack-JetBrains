<body>
Reporta declaraciones <code>expect</code> que tienen declaraciones <code>actual</code> ambiguas en la implementación de módulos multiplataforma.
<p>
    Por ejemplo:
</p>
<pre><code>
// common.kt
expect class Foo
// middle.kt
actual class Foo
// bottom.kt
actual class Foo
</code></pre>
</body>
