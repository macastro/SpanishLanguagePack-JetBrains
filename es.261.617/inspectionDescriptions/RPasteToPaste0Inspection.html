<html>
<body>
<p>Reporta separadores vacíos en la función <code>'paste'</code>.
  La corrección rápida reemplaza la llamada a <code>'paste'</code> por la función <code>'paste0'</code>.
<p><b>Ejemplo:</b></p>
<p>
  <code>
    paste("a", "b", sep = '')
  </code>
</p>
<p>
  Al aplicar la corrección rápida, el código cambia a:
</p>
<p>
  <code>
    paste0("a", "b")
  </code>
</p>
</body>
</html>
