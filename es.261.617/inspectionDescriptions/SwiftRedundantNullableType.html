<html>
<body>
<p>
  Reporta el uso de <code>?</code> que se puede omitir, por ejemplo, si el tipo inferido de la expresión asignada no puede ser null.
</p>
<p>
  Sugiere eliminar el <code>?</code> redundante en las declaraciones de tipo.
</p>
<p>
  <b>Ejemplo:</b>
</p>
<pre><code>
  let x: Int? = 42
</code></pre>
<p>
  Después de aplicar la corrección rápida:
</p>
<pre><code>
  let x: Int = 42
</code></pre>
</body>
</html>
