<p>Reporta la falta de <code>exec</code> en la forma shell del comando ENTRYPOINT.</p>
<p>
  Para asegurar que <code>docker stop</code> pueda enviar señales correctamente a cualquier ejecutable ENTRYPOINT de larga duración, es necesario usar <code>exec</code> para iniciarlo.
</p>
<p>
  Consulte la <a href="https://docs.docker.com/reference/dockerfile/#shell-form-entrypoint-example">referencia de Dockerfile</a> para más información.
</p>
