<html>
<body>
Reporta declaraciones <code>@import</code> con ubicación incorrecta.
<p>
  Según la <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/@import">especificación</a>, las reglas <code>@import</code> deben definirse en la parte superior de la hoja de estilos, antes que cualquier otra at-rule (excepto <code>@charset</code> y <code>@layer</code>) y declaraciones de estilo, de lo contrario serán ignoradas.
</p>
</body>
</html>
