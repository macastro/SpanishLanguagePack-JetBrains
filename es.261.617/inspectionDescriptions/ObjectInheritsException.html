<body>
Reporta objetos que heredan de <code>Exception</code>, ya que las excepciones son inherentemente con estado, conteniendo información como stack traces.
<p><b>Ejemplo:</b></p>
<pre><code>
object MyEx: Exception()
</code></pre>
<p>Después de aplicar la corrección rápida:</p>
<pre><code>
class MyEx: Exception()
</code></pre>
</body>
