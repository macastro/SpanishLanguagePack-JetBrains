<body>
<p>Informa de las secuencias no seguras generadas por los dos puntos (<code>:</code>) y sugiere reemplazarlas por una llamada segura.</p>
<p><b>Ejemplo:</b></p>
<pre><code>
    a &lt;- 1:length(c)
    b &lt;- 1:nrow(data.frame())
</code></pre>
<p>
  Al aplicar la corrección rápida, el código cambia a:
</p>
<pre><code>
    a &lt;- seq_along(c)
    b &lt;- seq_len(nrow(data.frame()))
  </code></pre>
</body>
