codex.acp.agent.confirm.install.enterprise=Para usar Codex en AI Assistant, Codex se instalará automáticamente al hacer clic en "Instalar y continuar".<br>La instalación está sujeta a la <a href="{0}">Licencia Apache, Versión 2.0</a>. Tras la instalación, sus datos pueden ser procesados por un proveedor externo bajo sus propios términos.<br>El uso posterior de Codex en AI Assistant se rige por los Términos de Licencia Especiales de JetBrains aplicables, dependiendo de si utiliza JetBrains IDE Services en la <a href="{1}">nube</a> o <a href="{2}">on-premise</a>.<br>El uso de Codex consume créditos de su cuota de JetBrains AI, a menos que haya vinculado su propia suscripción de un proveedor externo o proporcionado un token personal en la configuración de AI Assistant.
codex.acp.agent.confirm.install.jba=Para usar Codex en AI Assistant, Codex se instalará automáticamente al hacer clic en "Instalar y continuar".<br>La instalación está sujeta a la <a href="{0}">Licencia Apache, versión 2.0</a>. Después de la instalación, sus datos pueden ser procesados por un proveedor externo bajo sus términos.<br>El uso posterior de Codex en AI Assistant está sujeto a los <a href="{1}">Términos de servicio de JetBrains AI</a>.<br>El uso de Codex consume créditos de su cuota de JetBrains AI, a menos que haya vinculado su propia suscripción de un proveedor externo o haya proporcionado un token personal en la configuración de AI Assistant.
codex.acp.agent.confirm.install.message=Para utilizar Codex en AI Assistant, Codex se instalará automáticamente al hacer clic en "Instalar y continuar".<br>La instalación está sujeta a los <a href="{0}">Términos de uso</a> de OpenAI. Al hacer clic en "Instalar y continuar", acepta estos términos. El uso posterior de Codex en AI Assistant está sujeto a los <a href="{1}">Términos de servicio de JetBrains AI</a>.<br>El uso de Codex consume créditos de su cuota de JetBrains AI, a menos que haya vinculado su propia suscripción de un proveedor externo o proporcionado un token personal en los ajustes de AI Assistant.
