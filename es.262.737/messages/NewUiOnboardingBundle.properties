newUiOnboarding.dialog.text=Este es el nuevo aspecto predeterminado de los IDE de JetBrains. El editor y las ventanas de herramientas ahora están claramente separados para ayudarle a mantener la concentración.<p style="margin-top:4px">Realice un recorrido rápido para explorar el nuevo diseño y la navegación. Puede volver al plugin Classic UI en cualquier momento en Configuración | Plugins.
