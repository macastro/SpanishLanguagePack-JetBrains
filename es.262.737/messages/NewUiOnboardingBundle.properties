newUiOnboarding.git.widget.step.header=Widget de Git
newUiOnboarding.git.widget.step.text.no.repo=Cree un repositorio Git o comparta su proyecto. Una vez configurado el control de versiones, podrá cambiar fácilmente entre ramas, crear otras nuevas y acceder a acciones de Git habituales.
newUiOnboarding.git.widget.step.text.with.repo=Cambie entre ramas, cree nuevas y acceda a una lista de acciones de Git populares en la ventana emergente.
