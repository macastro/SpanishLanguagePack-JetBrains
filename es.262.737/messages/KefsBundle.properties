exceptions.action.default.body=Si estás desarrollando el plugin, debes revisar las excepciones y reemplazarlas con diagnósticos.<br/>Si no eres el desarrollador, puedes informar de este problema al autor del plugin mediante el botón inferior.<br/>
exceptions.action.header=<strong>Sugerencia de acción</strong><br/><br/>
exceptions.action.kotlinVersionMismatch.body=El archivo jar se cargó de forma insegura, utilizando un método de respaldo sin garantía de compatibilidad.<br/>Si está desarrollando el complemento, intente publicarlo con la misma versión de Kotlin que el IDE.<br/>Si no es el desarrollador, puede informar este problema al autor del complemento utilizando el botón de abajo.<br/>
exceptions.action.local.body=El archivo JAR se cargó desde una fuente local.<br/>Si está desarrollando el complemento, intente cambiar su lógica y volver a publicarlo localmente en la misma ubicación. Se actualizará automáticamente en el IDE.<br/>
exceptions.action.local.reloaded.body=El archivo jar se cargó desde una fuente local y se recargó al menos una vez con el mismo contenido, por lo que la excepción persiste (por ejemplo, durante una actualización manual o en segundo plano).<br/>Si está desarrollando el complemento, intente cambiar su lógica y volver a publicarlo localmente en el mismo lugar. Se actualizará automáticamente en el IDE.<br/>
exceptions.action.remote.reloaded.body=El jar se cargó desde una fuente remota y se recargó al menos una vez con el mismo contenido, por lo que la excepción persiste (por ejemplo, durante una actualización manual o en segundo plano).<br/>Si está desarrollando el complemento, intente cambiar su lógica, vuelva a publicarlo en el mismo lugar y ejecute la acción 'Update'<br/>
exceptions.analysis.header=<strong>Análisis de excepciones</strong><br/><br/>
exceptions.analysis.incompatibility.body=La versión del complemento no es compatible con la versión del IDE.<br/>Esta puede ser la causa de las excepciones generadas.<br/>La API del compilador no es compatible binariamente entre versiones de Kotlin.<br/><br/>Versión de Kotlin indicada en el jar: {0}<br/>Versión de Kotlin en el IDE: {1}<br/><br/>
exceptions.analysis.probablyIncompatible.body=Las excepciones lanzadas son probablemente un signo de incompatibilidad binaria entre la versión de Kotlin del IDE y la versión de Kotlin del plugin.<br/>El plugin indica que la versión de Kotlin coincide. Sin embargo, puede que este no sea el caso.<br/><br/>Versión de Kotlin en el IDE: {0}<br/><br/>
