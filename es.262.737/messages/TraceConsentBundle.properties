notification.trace.data.sharing.internal.text=El IDE puede registrar cómo interactúa con el código, el IDE y los complementos (como AI Assistant y Junie). Esto nos ayuda a mejorar la funcionalidad de los productos de JetBrains y a entrenar nuestros modelos de ML. Los datos registrados no están vinculados a su cuenta de JetBrains, pero pueden contener elementos del texto o código que edite. Puede optar por no participar en cualquier momento en {0} | Apariencia & comportamiento | Ajustes del sistema | Compartir datos. <a href="https://www.jetbrains.com/legal/docs/terms/product_data_collection/">Más información</a>.
