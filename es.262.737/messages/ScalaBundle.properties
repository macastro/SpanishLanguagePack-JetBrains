scala.project.settings.form.performance.guidelines=<html><body>Para mejorar el rendimiento:<br><ul><li><strong>Asegúrese de que haya suficiente memoria</strong><br>Para ver el uso de memoria actual, haga clic derecho en la barra de estado y active <em>Memory Indicator</em> (o <em>Find Action</em> &ldquo;CPU and Memory Live Charts&rdquo;). Si es necesario, utilice <em>Help | Change Memory Settings</em> para aumentar el tamaño máximo del heap.</li> <li><strong>Optimice el código para el resaltado</strong><br>De la misma manera que el código tiene un rendimiento en tiempo de ejecución, también tiene un rendimiento en tiempo de compilación. Las &ldquo;leyes del resaltado&rdquo;, al igual que las leyes de la física, son reales y deben respetarse para que el resaltado sea eficiente. Consulte las directrices sobre <a href="https://youtrack.jetbrains.com/issue/SCL-24113">cómo hacer que el código sea fácil de resaltar</a>.</li><li><strong>Pruebe el <em>Resaltado incremental</em></strong><br>Cuando use el resaltado <em>Built-in</em>, puede activar <em>Settings | Languages | Scala | Editor | Incremental highlighting</em> para <a href="https://youtrack.jetbrains.com/issue/SCL-23216">resaltar solo lo que es visible</a>. (Presione dos veces <code>Esc</code> para resaltar todo el archivo). Esto ayuda a reducir el uso de CPU, RAM y batería, especialmente en archivos grandes y complejos, y también aumenta la capacidad de respuesta.</li><li><strong>Use el resaltado del <em>Compilador</em> sin inspecciones</strong><br>El uso de <em>Settings | Languages | Scala | Editor | Error highlighting: Compiler</em> ayuda con los errores falsos en código complejo, pero en casos normales suele ser más lento y consume más recursos. Sin embargo, si también selecciona <em>Disable built-in inspections</em>, esto puede ayudar con el uso de CPU, RAM y batería en casos que supongan un reto para la inferencia de tipos integrada.</li><li><strong>Use el resaltado <em>Built-in</em> si el código no compila</strong><br>Si el código no compila limpiamente, el resaltado del <em>Compilador</em> es particularmente ineficiente. En tal caso, pruebe el resaltado <em>Built-in</em>, posiblemente con el <em>Resaltado incremental</em>. (Si hay falsos positivos, puede desactivar la opción <em>Type-aware</em>).</li><li><strong>Capture instantáneas de CPU y memoria</strong><br>A veces, los problemas de rendimiento son inherentes y dependen del código. Otras veces, la causa es una ineficiencia en los algoritmos. Siga las directrices para <a href="https://intellij-support.jetbrains.com/hc/en-us/articles/207241235-Reporting-performance-problems">informar sobre problemas de rendimiento</a> para capturar instantáneas de CPU y memoria y publíquelas en el <a href="https://youtrack.jetbrains.com/issues/SCL#newissue">rastreador de problemas</a>, lo que nos ayudará a diagnosticar y solucionar el problema.</li><li><strong>Póngase en contacto</strong><br>Si tiene alguna pregunta, estaremos encantados de responderla en el <a href="https://discord.gg/aUKpZzeHCK">canal de discord del plugin de Scala</a>.</li></ul></body></html>
