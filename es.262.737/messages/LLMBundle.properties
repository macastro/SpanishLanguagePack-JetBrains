user.intent.descriptions.assistant.capabilities=Preguntas sobre las funcionalidades y limitaciones de {0}.
user.intent.descriptions.code.conversion=Solicitudes para traducir o convertir código de un lenguaje de programación a otro, basándose en el fragmento de código proporcionado por el usuario.
user.intent.descriptions.code.explain=Solicitudes para aclarar o describir qué hace un fragmento de código proporcionado, sin necesidad de modificar o generar código nuevo. El usuario busca comprender el propósito o la función del código.
user.intent.descriptions.code.generation=Solicitudes para generar código nuevo basado en una tarea o requisito descrito por el usuario. El usuario puede proporcionar algo de contexto o código existente, pero el objetivo principal es crear código nuevo que cumpla con la solicitud del usuario.
user.intent.descriptions.code.modification=Solicitudes para modificar o mejorar un fragmento de código existente proporcionado por el usuario. La respuesta debe incluir el código modificado que refleje los cambios solicitados, tales como optimización, adición de funcionalidades o corrección del código.
user.intent.descriptions.code.question=Consultas específicas sobre un fragmento de código proporcionado. El usuario busca aclaración, validación o comprensión de cómo funciona el código o si es correcto. El código debe mencionarse o adjuntarse explícitamente, y el usuario no solicita cambios en el código ni la detección de errores.
user.intent.descriptions.code.refactoring=Solicitudes para refactorizar o reorganizar código existente, proporcionado por el usuario, para mejorar su estructura, legibilidad o mantenibilidad sin cambiar su funcionalidad.
user.intent.descriptions.error.explanation=Solicitudes en las que el usuario describe un problema, a menudo incluyendo un mensaje de error o una salida incorrecta, y solicita una explicación o una solución. El usuario puede o no proporcionar el código relevante. El enfoque principal es comprender por qué algo no funciona.
user.intent.descriptions.find.bugs=Solicitudes dirigidas específicamente a identificar y explicar errores o fallos dentro de un fragmento de código proporcionado. El usuario espera que la respuesta señale los problemas y, potencialmente, sugiera correcciones.
user.intent.descriptions.general.request=Solicitudes de información general que no requieren un fragmento de código específico. Estas son típicamente preguntas de tipo "cómo hacer algo" similares a las búsquedas de Google. Los ejemplos incluyen preguntas sobre conceptos generales, uso de herramientas o prácticas de programación. No requieren conocimiento de la base de código del usuario.
user.intent.descriptions.intellij.question=Consultas relacionadas con el uso de IntelliJ IDEA, como por ejemplo cómo acceder a ciertas funciones o realizar tareas específicas dentro del IDE.
user.intent.descriptions.other=Mensajes que no encajan en ninguna otra categoría predefinida, como caracteres aleatorios o contenido irrelevante.
user.intent.descriptions.project.specific=Preguntas centradas en la estructura general, la arquitectura o los detalles específicos de un proyecto en particular, en lugar de consultas generales de programación. El usuario suele preguntar sobre conceptos de alto nivel o sobre la organización dentro de un proyecto específico.
user.intent.descriptions.test.generation=Solicitudes para crear casos de prueba para un fragmento de código proporcionado. El usuario espera que la respuesta incluya código de prueba relevante que pueda verificar la corrección del código original.
