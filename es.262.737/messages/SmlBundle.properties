sml.studiobot.onboarding.step1.introBlurb.html=<html><head><style>%%STYLE%%</style></head><body>Gemini en {0} es un asistente de programación con IA que te ayuda a crear aplicaciones de alta calidad con mayor rapidez. <a href="https://d.android.com/r/studio-ui/gemini">Más información</a></body></html>
sml.studiobot.onboarding.step1.introBlurb.markdown=Gemini en {0} es un asistente de programación con IA que te ayuda a crear aplicaciones de alta calidad más rápido. [Más información](https://d.android.com/r/studio-ui/gemini)
sml.studiobot.onboarding.step2.privacyNotice.body.html=<html><head><style>%%STYLE%%</style></head><body>Este aviso y nuestra <a href="https://policies.google.com/privacy">Política de Privacidad</a> describen cómo Gemini trata tus datos. Por favor, léelos con atención.<br/><br/><b>Tu código fuente en Android Studio no está sujeto a este Aviso de Privacidad, excepto cuando lo envíes a Gemini (p. ej., peticiones) o cuando utilices la función de completado de código por IA.</b> Al utilizar Gemini en {0}, Google recopila tus peticiones, el código relacionado, el resultado generado, la información de uso de funciones relacionadas y tus comentarios. Google utiliza estos datos para ofrecer, mejorar y desarrollar productos y servicios de Google, así como tecnologías de aprendizaje automático, incluidos los productos empresariales de Google, como Google Cloud.<br/><br/>Para ayudar con la calidad y mejorar nuestros productos, revisores humanos pueden leer, anotar y procesar tus peticiones, el código relacionado, el resultado generado, la información de uso de funciones relacionadas y tus comentarios. <b>No incluyas información confidencial o personal en tus peticiones o comentarios que pueda utilizarse para identificarte a ti o a otras personas.</b> Tus datos se conservarán durante un máximo de 18 meses y se almacenarán de forma que Google no pueda saber quién los ha proporcionado. Google no puede atender solicitudes de eliminación durante este tiempo.</body></html>
sml.studiobot.onboarding.step2.privacyNotice.title.html=<html><b>Aviso de privacidad de Gemini</b></html>
sml.studiobot.onboarding.step2.privacyNotice.title.plaintext=Aviso de privacidad de Gemini
sml.studiobot.onboarding.step3.blurb.html=<html><head><style>%%STYLE%%</style></head><body><p>Al probar Gemini, estas son algunas cosas clave que debes saber:</p><ul><li>Gemini utiliza tus mensajes y el historial de conversaciones anteriores para ofrecer respuestas. <b>No es necesario que compartas tu código para usar Gemini.</b> <a href="https://d.android.com/r/studio-ui/gemini/data-and-privacy/sharing-code">Más información</a></li><li>Gemini puede generar información inexacta o insultante que no representa la opinión de Google. Votar las respuestas ayudará a mejorar Gemini.</li><li><b>Usa el código generado con precaución.</b> <a href="https://g.co/legal/generative-code">Más información</a></li></ul></body></html>
sml.studiobot.onboarding.step3.checkbox.html=<html><head><style>%%STYLE%%</style></head><body><p>Debes tener al menos 18 años para usar Gemini en {0}. El uso de Gemini está sujeto a los <a href="https://policies.google.com/terms">Términos del Servicio de Google</a> y a los <a href="https://policies.google.com/terms/generative-ai">Términos del Servicio Adicionales de la IA Generativa</a></body></html>
sml.studiobot.onboarding.step4.blurb.markdown=¡Gracias por probar Gemini!\n\nPara terminar, por favor confirma qué configuración de privacidad quieres usar para empezar. Puedes cambiarla en cualquier momento en **Ajustes > Herramientas > Gemini**.
