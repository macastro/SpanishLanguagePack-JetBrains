<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p>Si la carga de variables durante el debug toma mucho tiempo, es posible que veas los mensajes de advertencia <span class="control">Se agotó el tiempo de carga</span>.</p><p>Haz clic en el enlace <span class="control">Cambiar a carga bajo demanda</span> en la ventana <span class="control">Variables</span> para cambiar al modo en el que las variables se cargan a petición del usuario.</p></body></html>
