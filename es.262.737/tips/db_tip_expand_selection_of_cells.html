<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Expandir selección de celdas</b></p><p>Puedes expandir la selección (<span class="shortcut">&shortcut:EditorSelectWord;</span>) de elementos desde una celda a una columna, una fila o toda la tabla.</p><p>Alternativamente, para reducir la selección, presiona <span class="shortcut">&shortcut:EditorUnSelectWord;</span>.</p><p class="image"><img src="images/tips_db_expand_selection_of_cells.png" alt="Expandir selección de celdas" style="border: 1px solid #55555;" /></p></body></html>
