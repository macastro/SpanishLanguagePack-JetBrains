<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ver jerarquía de herencia</b></p><p>Para ver la jerarquía de herencia de la clase seleccionada, presiona <span class="shortcut">&shortcut:TypeHierarchy;</span> (<span class="control">Navegar | Jerarquía de Tipos</span>). También puedes invocar la vista de jerarquía directamente desde el editor para ver la jerarquía de la clase que estás editando actualmente.</p><p class="image"><img src="images/py_tips-hierarchy_browser.png" alt="Navegador de jerarquía de tipos" style="border: 1px solid #55555;" /></p></body></html>
