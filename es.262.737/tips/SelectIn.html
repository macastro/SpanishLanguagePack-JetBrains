<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Seleccionar En</b></p><p>Para seleccionar rápidamente el elemento editado actualmente (una clase, archivo, método o campo) en otra vista, presiona <span class="shortcut">&shortcut:SelectIn;</span> o llama <span class="control">Navegar | Seleccionar En</span>.</p><p class="image"><img src="images/py_tips-select_in.png" alt="Popup Seleccionar En" style="border: 1px solid #55555;" /></p></body></html>
