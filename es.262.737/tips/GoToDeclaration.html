<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Navegar a la declaración</b></p><p>Para navegar a la declaración de una clase, método o variable desde su uso, coloca el cursor en el símbolo y presiona <span class="shortcut">&shortcut:GotoDeclaration;</span> (<span class="control">Navigate | Declaration or Usages</span>). También puedes hacer <span class="shortcut">Ctrl+Click</span> en un uso para saltar a la declaración. </p><p class="image"><img src="images/py_tips_ctrl_click.png" alt="Ir a la Declaración con Ctrl/Cmd+Click" style="border: 1px solid #55555;" /></p></body></html>
