<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Archivos scratch</b></p><p>Los archivos scratch son archivos temporales que te permiten experimentar y crear prototipos en el editor, sin crear ningún archivo de proyecto.</p><p>Para crear un archivo scratch, presiona <span class="shortcut">&shortcut:NewScratchFile;</span>, y luego selecciona el lenguaje a usar.</p></body></html>
