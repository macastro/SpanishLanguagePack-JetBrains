<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Separadores de métodos</b></p><p>Habilita líneas separadoras entre métodos en el editor para distinguir el cuerpo de cada método de un vistazo. En la página <span class="control">Editor | General | Apariencia</span> del diálogo <span class="control">Configuración</span> <span class="shortcut">&shortcut:ShowSettings;</span>, selecciona la casilla <span class="control">Mostrar separadores de métodos</span>.</p><p class="image"><img src="images/py_methodseparators.png" alt="Mostrar separadores de métodos" style="border: 1px solid #55555;" /></p></body></html>
