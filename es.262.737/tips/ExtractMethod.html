<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Extraer un método</b></p><p>El refactoring <span class="control">Extract Method</span> crea un método a partir de un fragmento de código. Selecciona un bloque de código y presiona <span class="shortcut">&shortcut:ExtractMethod;</span> (<span class="control">Refactor | Extract | Method</span>).</p></body></html>
