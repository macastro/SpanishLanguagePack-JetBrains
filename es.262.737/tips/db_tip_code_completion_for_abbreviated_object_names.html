<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Autocompletado de código para nombres abreviados</b></p><p>Completa nombres de objetos que están escritos en camelCase, nombres-con-guiones, o nombres_con_guión_bajo. Para iniciar el autocompletado de código, usa las primeras letras de las palabras en el nombre.</p></body></html>
