<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Ver el contenido de archivos en una ventana emergente sin abrirlos</b></p><p>Para abrir una ventana de definición rápida, selecciona un archivo en la ventana de herramientas <span class="control">Archivos</span> (<span class="control">Ver | Ventanas de herramientas | Archivos</span>) y presiona <span class="shortcut">&shortcut:QuickPreview;</span>.</p><p class="image"><img src="images/tips_db_quick_definition_of_file.png" alt="Definición rápida del contenido del archivo" style="border: 1px solid #55555;" /></p></body></html>
