<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cerrar pestañas del editor</b></p><p>Puedes cerrar pestañas en el editor y ventanas de herramientas sin usar los comandos del menú contextual. Haz clic en la pestaña que deseas cerrar con el botón central del ratón o usa <span class="shortcut">Shift+Click</span> sobre ella.</p></body></html>
