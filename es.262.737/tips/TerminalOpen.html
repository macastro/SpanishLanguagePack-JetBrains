<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Abrir terminal con un atajo</b></p><p>PyCharm te permite lanzar el terminal local integrado usando el atajo de teclado. Presiona <span class="shortcut">&shortcut:ActivateTerminalToolWindow;</span> y verás el terminal ejecutándose.</p></body></html>
