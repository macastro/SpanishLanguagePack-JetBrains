<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Refactoring de renombrado en línea</b></p><p>Cuando presionas <span class="shortcut">&shortcut:RenameElement;</span> para renombrar un elemento, puedes hacer clic en los iconos cerca del elemento y seleccionar si quieres renombrarlo en comentarios y cadenas o en todas las ocurrencias de texto.</p><p class="image"><img src="images/db_tips_options_for_inline_rename_refactoring.png" alt="Opciones para el refactoring de renombrado" style="border: 1px solid #55555;" /></p></body></html>
