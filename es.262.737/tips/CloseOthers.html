<html><head><meta charset="UTF-8"><link rel="stylesheet" type="text/css" href="css/tips.css"></head><body><p><b>Cerrar pestañas del editor</b></p><p>Para cerrar todas las pestañas del editor excepto la actual, mantén presionado <span class="shortcut">Alt</span> (Windows y Linux) o <span class="shortcut">Alt(Option)</span> (macOS) y haz clic en <img src="images/app.expui.general.closeSmall.png" alt="the Close button"/> en la pestaña del editor actual.</p><p class="image"><img src="images/py_tips-close_others.png" alt="Close others" style="border: 1px solid #55555;" /></p></body></html>
