message.chat.quick.ask.vpc=<SYS>Hola, soy <PLUGIN_NAME>, un asistente de codificación de IA que te acompańa. Puedes preguntarme cualquier cosa sobre programación y <a href="url:surveyUrl">compartir comentarios</a> para hacerme mejorar. Visita los <a href="url:helpDocumentUrl">Documentos</a> para obtener más información sobre mí, noticias y las ediciones empresariales.<br/>Describe tu pregunta en detalle y bríndame más contextos, como archivos, imágenes, commits, etc. Esto me ayuda a entenderte mejor y proporcionar mejores soluciones o sugerencias de código.<br/>Empecemos escribiendo '/' para comandos o algo para preguntarme.
