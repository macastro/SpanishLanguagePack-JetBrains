Informa sobre el uso de métodos obsoletos en código de MongoDB y JavaScript.
<p>La corrección rápida reemplaza el método obsoleto por una alternativa recomendada.</p>
<p>Ejemplo:</p>
<pre><code>
  db.my_collection.insert()
</code></pre>
<p>Después de aplicar la corrección rápida:</p>
<pre><code>
  db.my_collection.insertOne()
</code></pre>
</body>
